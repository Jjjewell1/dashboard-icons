<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JewellCore Icon Gallery</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card-hover: #20242e;
    --border: #2a2e38;
    --text: #e6e8ec;
    --muted: #8a8f9c;
    --accent: #4f8cff;
    --accent-glow: rgba(79, 140, 255, 0.35);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15, 17, 21, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 18px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 600;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  #search {
    width: 100%;
    max-width: 480px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #count {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
  }
  main {
    padding: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 14px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .icon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    position: relative;
  }
  .icon-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .icon-card img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    margin-bottom: 10px;
  }
  .icon-name {
    font-size: 12px;
    color: var(--text);
    word-break: break-word;
    line-height: 1.3;
  }
  .icon-formats {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .copied-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .copied-badge.show {
    opacity: 1;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    grid-column: 1 / -1;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 30px 20px 40px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>🧩 JewellCore Icon Gallery</h1>
  <div class="subtitle" id="subtitle">Loading icons…</div>
  <input type="text" id="search" placeholder="Search icons (e.g. plex, sonarr, pihole)..." autocomplete="off">
  <div id="count"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Self-hosted from <a href="https://github.com/walkxcode/dashboard-icons" target="_blank">walkxcode/dashboard-icons</a>
  &middot; Click any icon to copy its URL
</footer>

<script>
  // Base URL where this site is deployed — icons are served from the
  // same folders (png/, svg/, webp/) alongside this index.html
  const BASE_URL = "https://icons.jewellcore.com";

  const PREFERRED_FORMAT_ORDER = ["svg", "png", "webp"];

  let allIcons = [];

  const grid = document.getElementById("grid");
  const search = document.getElementById("search");
  const countEl = document.getElementById("count");
  const subtitleEl = document.getElementById("subtitle");

  function bestFormat(formats) {
    for (const fmt of PREFERRED_FORMAT_ORDER) {
      if (formats.includes(fmt)) return fmt;
    }
    return formats[0];
  }

  function iconUrl(name, format) {
    return `${BASE_URL}/${format}/${name}.${format}`;
  }

  function renderIcons(icons) {
    grid.innerHTML = "";

    if (icons.length === 0) {
      grid.innerHTML = `<div class="empty-state">No icons match your search.</div>`;
      countEl.textContent = "";
      return;
    }

    countEl.textContent = `${icons.length} icon${icons.length === 1 ? "" : "s"}`;

    const fragment = document.createDocumentFragment();

    icons.forEach((icon) => {
      const fmt = bestFormat(icon.formats);
      const url = iconUrl(icon.name, fmt);

      const card = document.createElement("div");
      card.className = "icon-card";
      card.innerHTML = `
        <img src="${url}" loading="lazy" alt="${icon.name}">
        <div class="icon-name">${icon.name}</div>
        <div class="icon-formats">${icon.formats.join(" · ")}</div>
        <div class="copied-badge">Copied!</div>
      `;

      card.addEventListener("click", () => {
        navigator.clipboard.writeText(url).then(() => {
          const badge = card.querySelector(".copied-badge");
          badge.classList.add("show");
          setTimeout(() => badge.classList.remove("show"), 1200);
        });
      });

      fragment.appendChild(card);
    });

    grid.appendChild(fragment);
  }

  function filterIcons(query) {
    const q = query.trim().toLowerCase();
    if (!q) return allIcons;
    return allIcons.filter((icon) => icon.name.toLowerCase().includes(q));
  }

  search.addEventListener("input", (e) => {
    renderIcons(filterIcons(e.target.value));
  });

  fetch("icons.json")
    .then((res) => {
      if (!res.ok) throw new Error("icons.json not found");
      return res.json();
    })
    .then((data) => {
      allIcons = data.icons;
      subtitleEl.textContent = `${data.generated_count} icons available · self-hosted at ${BASE_URL}`;
      renderIcons(allIcons);
    })
    .catch((err) => {
      subtitleEl.textContent = "Failed to load icons.json — did you run generate_manifest.py and commit it?";
      grid.innerHTML = `<div class="empty-state">Could not load icons.json.<br>Make sure it's in the same folder as this page.</div>`;
      console.error(err);
    });
</script>

</body>
</html>
